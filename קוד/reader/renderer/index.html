<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; script-src 'self'; style-src 'unsafe-inline'; img-src blob: data:; media-src blob:; connect-src http://localhost:4000 http://127.0.0.1:4000;" />
  <title>Archive Reader</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: #0f172a; color: #e2e8f0;
      font-family: "Segoe UI", Arial, sans-serif; user-select: none; -webkit-user-select: none; }
    .wrap { max-width: 1000px; margin: 0 auto; padding: 22px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; border-bottom: 1px solid #1e293b; padding-bottom: 12px; }
    .brand { font-size: 20px; font-weight: 700; }
    .lock { color: #38bdf8; font-size: 13px; }
    .card { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 22px; margin-top: 18px; }
    input { width: 100%; padding: 10px 12px; margin-top: 6px; border-radius: 8px; border: 1px solid #334155;
      background: #0b1220; color: #e2e8f0; font-size: 15px; }
    label { display: block; margin-top: 12px; font-size: 14px; color: #94a3b8; }
    button { padding: 9px 16px; border-radius: 8px; border: none; background: #2563eb; color: #fff; font-size: 15px; cursor: pointer; }
    button.ghost { background: #1e293b; color: #e2e8f0; border: 1px solid #334155; }
    button:disabled { opacity: .5; cursor: default; }
    .msg { margin-top: 12px; font-size: 14px; }
    .err { color: #fca5a5; }
    .muted { color: #94a3b8; }
    .hidden { display: none; }
    .list { display: flex; flex-direction: column; gap: 6px; margin-top: 14px; max-height: 70vh; overflow: auto; }
    .row { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 10px 12px;
      background: #0b1220; border: 1px solid #1f2937; border-radius: 8px; cursor: pointer; }
    .row:hover { border-color: #2563eb; }
    .stage { display: flex; align-items: center; justify-content: center; min-height: 60vh; background: #000;
      border-radius: 10px; margin-top: 12px; padding: 8px; }
    .stage img, .stage video { max-width: 100%; max-height: 70vh; border-radius: 6px; }
    pre { color: #e2e8f0; white-space: pre-wrap; word-break: break-word; max-height: 70vh; overflow: auto;
      width: 100%; text-align: left; direction: ltr; margin: 0; padding: 12px; }
    .pager { display: flex; gap: 10px; justify-content: center; align-items: center; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">Archive Reader</div>
      <div class="lock">🔒 צפייה מאובטחת · ללא הורדה · מוחרג מצילום מסך</div>
    </div>

    <!-- התחברות -->
    <section id="login" class="card">
      <h2 style="margin-top:0">התחברות</h2>
      <label>אימייל<input id="email" type="email" autocomplete="off" /></label>
      <label>סיסמה<input id="password" type="password" autocomplete="off" /></label>
      <div id="twofa" class="hidden">
        <label>קוד אימות שנשלח למייל<input id="code" inputmode="numeric" maxlength="6" autocomplete="off" /></label>
      </div>
      <div style="margin-top:16px"><button id="loginBtn">כניסה</button></div>
      <div id="loginMsg" class="msg"></div>
      <div class="msg muted" id="deviceLine"></div>
    </section>

    <!-- אזור מחובר -->
    <section id="app" class="card hidden">
      <div style="display:flex; justify-content:space-between; align-items:center; gap:10px">
        <div><strong id="hello"></strong></div>
        <button class="ghost" id="logoutBtn">יציאה</button>
      </div>

      <div id="browse">
        <div class="muted" style="margin-top:10px">בחר קובץ לצפייה מוגנת:</div>
        <div id="fileList" class="list"></div>
      </div>

      <div id="viewer" class="hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; gap:10px; margin-top:4px">
          <strong id="viewerName"></strong>
          <button class="ghost" id="backBtn">← חזרה לרשימה</button>
        </div>
        <div id="stage" class="stage"></div>
        <div id="pager" class="pager hidden">
          <button class="ghost" id="prevBtn">← הקודם</button>
          <span id="pageInfo" class="muted"></span>
          <button class="ghost" id="nextBtn">הבא →</button>
        </div>
        <div id="viewerMsg" class="msg"></div>
      </div>
    </section>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
